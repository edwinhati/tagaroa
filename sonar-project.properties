sonar.organization=tagaroa
sonar.projectKey=edwinhati_tagaroa
sonar.projectName=Tagaroa
sonar.host.url=https://sonarcloud.io
sonar.sourceEncoding=UTF-8

# Limit analysis to the actual applications/packages/servers folders.
sonar.sources=apps,packages,servers
sonar.tests=apps,packages,servers
sonar.test.inclusions=**/*_test.go,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Ignore generated or vendored artifacts plus infra files that pollute the signal.
sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/.turbo/**,**/coverage/**,packages/ui/**,infra/**,get_sonar.js,sonar_issues.json
sonar.coverage.exclusions=**/*.stories.ts,**/*.stories.tsx,**/*.story.tsx,**/*.story.ts,**/*.d.ts

# Surface Go coverage created by `make test-coverage SERVER=finance`.
sonar.go.coverage.reportPaths=servers/finance/coverage.out

# Surface JS/TS coverage (if present) from standard lcov locations without failing when absent.
sonar.javascript.lcov.reportPaths=**/coverage/lcov.info

# Do NOT store secrets in VCS; provide SONAR_TOKEN/sonar.login via CI environment.
