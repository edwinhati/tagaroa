# SonarCloud configuration
# https://docs.sonarcloud.io/advanced-setup/analysis-parameters/

# Exclude third-party code that is not authored in this repo
sonar.exclusions=packages/ui/**,**/node_modules/**,**/*.spec.ts,**/*.spec.tsx,**/*.test.ts,**/*.test.tsx

# Also exclude from coverage reports
sonar.coverage.exclusions=packages/ui/**,**/node_modules/**
