services:
  postgres:
    image: "postgres:alpine"
    container_name: "postgres"
    restart: "always"
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "postgres"
    ports:
      - "5432:5432"
    volumes:
      - "postgres_data:/var/lib/postgresql/data"

  clickhouse:
    image: "clickhouse/clickhouse-server:latest"
    container_name: "clickhouse"
    restart: "always"
    ports:
      - "8123:8123"
      - "9009:9000"
    volumes:
      - "clickhouse_data:/var/lib/clickhouse"
    environment:
      CLICKHOUSE_USER: "default"
      CLICKHOUSE_PASSWORD: "clickhouse"

  kafka:
    image: "confluentinc/cp-kafka:latest"
    container_name: "kafka"
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - "kafka_data:/var/lib/kafka/data"
    healthcheck:
      test:
        - "CMD"
        - "kafka-topics"
        - "--bootstrap-server"
        - "localhost:29092"
        - "--list"
      interval: "30s"
      timeout: "10s"
      retries: 5

  kafka-ui:
    image: "provectuslabs/kafka-ui:latest"
    container_name: "kafka-ui"
    depends_on:
      - "kafka"
    ports:
      - "9090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "local"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:29092"
    restart: "unless-stopped"

  minio:
    image: "minio/minio:latest"
    container_name: "minio"
    restart: "unless-stopped"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
    command: 'server /data --console-address ":9001"'
    volumes:
      - "minio_data:/data"

  n8n:
    image: "n8nio/n8n:latest"
    container_name: "n8n"
    restart: "unless-stopped"
    ports:
      - "5678:5678"
    environment:
      - "DB_TYPE=postgresdb"
      - "DB_POSTGRESDB_HOST=postgres"
      - "DB_POSTGRESDB_PORT=5432"
      - "DB_POSTGRESDB_DATABASE=n8n"
      - "DB_POSTGRESDB_USER=postgres"
      - "DB_POSTGRESDB_PASSWORD=postgres"
      - "N8N_BASIC_AUTH_ACTIVE=true"
      - "N8N_BASIC_AUTH_USER=admin"
      - "N8N_BASIC_AUTH_PASSWORD=admin"
      - "N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true"
      - "N8N_RUNNERS_ENABLED=true"
      - "N8N_BLOCK_ENV_ACCESS_IN_NODE=false"
      - "N8N_GIT_NODE_DISABLE_BARE_REPOS=true"
    volumes:
      - "n8n_data:/home/node/.n8n"
    depends_on:
      - "postgres"
      - "kafka"
    networks:
      - default

  drizzle-gateway:
    container_name: drizzle-gate
    image: ghcr.io/drizzle-team/gateway:latest
    restart: always
    ports:
      - "4983:4983"
    environment:
      PORT: "4983" # optional
      STORE_PATH: "/app" # optional
      MASTERPASS: "tagaroa" # optional (consider using .env instead)
    volumes:
      - drizzle_data:/app

  # Observability Stack
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: tagaroa-jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "4318:4318"    # OTLP HTTP receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - tagaroa

  prometheus:
    image: prom/prometheus:latest
    container_name: tagaroa-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - tagaroa

  grafana:
    image: grafana/grafana:latest
    container_name: tagaroa-grafana
    ports:
      - "3030:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_ROOT_URL=http://localhost:3030
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - tagaroa

volumes:
  postgres_data:
  clickhouse_data:
  kafka_data:
  minio_data:
  n8n_data:
  drizzle_data:
  prometheus-data:
  grafana-data:


networks:
  tagaroa:
    driver: bridge

  