# Lefthook configuration
# See: https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md

pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.{js,ts,jsx,tsx,json,css}"
      run: bun run format {staged_files}
      stage_fixed: true
    lint:
      run: bun run lint

pre-push:
  parallel: true
  commands:
    test:
      run: bun run test
    type-check:
      run: bun run check-types
