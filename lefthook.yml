# Lefthook configuration
# See: https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md

pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.{js,ts,jsx,tsx,json}"
      run: bun run format {staged_files}
      stage_fixed: true
    lint:
      run: bun run lint
    test:
      run: bun run test

pre-push:
  commands:
    lint:
      run: bun run lint
    type-check:
      run: bun run check-types
