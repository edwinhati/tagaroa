---
# CNPG Role Tasks - Deploy CloudNativePG Operator

- name: Add CNPG Helm repository
  kubernetes.core.helm_repository:
    name: cnpg
    repo_url: "https://cloudnative-pg.github.io/charts"

- name: Deploy CloudNativePG operator via Helm
  kubernetes.core.helm:
    kubeconfig: "{{ k8s_kubeconfig }}"
    name: cnpg
    chart_ref: cnpg/cloudnative-pg
    chart_version: "{{ cnpg_helm_version }}"
    release_namespace: "{{ cnpg_namespace }}"
    create_namespace: true
    wait: true
    timeout: "{{ k8s_wait_timeout }}s"
    values:
      monitoring:
        podMonitorEnabled: "{{ cnpg_monitoring_enabled }}"

- name: Wait for CNPG operator deployment to be ready
  kubernetes.core.k8s_info:
    kubeconfig: "{{ k8s_kubeconfig }}"
    kind: Deployment
    namespace: "{{ cnpg_namespace }}"
    label_selectors:
      - "app.kubernetes.io/name=cloudnative-pg"
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: "{{ k8s_wait_timeout }}"
