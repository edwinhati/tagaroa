---
# Kong Gateway Role Tasks

- name: Create Kong namespace
  kubernetes.core.k8s:
    kubeconfig: "{{ k8s_kubeconfig }}"
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ kong_namespace }}"

- name: Install Gateway API CRDs
  kubernetes.core.k8s:
    kubeconfig: "{{ k8s_kubeconfig }}"
    state: present
    src: "https://github.com/kubernetes-sigs/gateway-api/releases/download/{{ kong_gateway_api_version }}/standard-install.yaml"
  when: kong_gateway_api.enabled | bool

- name: Add Kong Helm repository
  kubernetes.core.helm_repository:
    name: kong
    repo_url: "https://charts.konghq.com"

- name: Deploy Kong Gateway via Helm
  kubernetes.core.helm:
    kubeconfig: "{{ k8s_kubeconfig }}"
    name: kong
    chart_ref: kong/kong
    chart_version: "{{ kong_helm_version }}"
    release_namespace: "{{ kong_namespace }}"
    create_namespace: true
    skip_crds: true
    wait: true
    timeout: "{{ k8s_wait_timeout }}s"
    values:
      # Deployment mode
      deployment:
        kong:
          enabled: true

      # Ingress Controller
      ingressController:
        enabled: "{{ kong_ingress_controller.enabled }}"
        installCRDs: false
        gatewayAPI:
          enabled: "{{ kong_gateway_api.enabled }}"

      # Proxy configuration
      proxy:
        enabled: true
        type: "{{ kong_service_type }}"
        http:
          enabled: "{{ kong_proxy.http.enabled }}"
          servicePort: "{{ kong_proxy.http.servicePort }}"
        tls:
          enabled: "{{ kong_proxy.tls.enabled }}"
          servicePort: "{{ kong_proxy.tls.servicePort }}"

      # Admin API
      admin:
        enabled: "{{ kong_admin.enabled }}"
        http:
          enabled: "{{ kong_admin.http.enabled }}"
        tls:
          enabled: "{{ kong_admin.tls.enabled }}"

      # Kong Manager (GUI)
      manager:
        enabled: "{{ kong_manager.enabled }}"

      # Environment
      env: "{{ kong_env }}"

      # Resources
      resources: "{{ kong_resources }}"

- name: Wait for Kong to be ready
  kubernetes.core.k8s_info:
    kubeconfig: "{{ k8s_kubeconfig }}"
    kind: Pod
    namespace: "{{ kong_namespace }}"
    label_selectors:
      - "app.kubernetes.io/name=kong"
  register: kong_pods
  until: >
    kong_pods.resources | length > 0 and
    (kong_pods.resources | selectattr('status.phase', 'equalto', 'Running') | list | length) > 0
  retries: 30
  delay: 10

- name: Display Kong proxy service info
  kubernetes.core.k8s_info:
    kubeconfig: "{{ k8s_kubeconfig }}"
    kind: Service
    namespace: "{{ kong_namespace }}"
    name: kong-kong-proxy
  register: kong_service

- name: Show Kong Gateway access info
  ansible.builtin.debug:
    msg: |
      ✅ Kong Gateway deployed successfully!

      Proxy Service: kong-kong-proxy
      Namespace: {{ kong_namespace }}
      {% if kong_service.resources | length > 0 %}
      Service Type: {{ kong_service.resources[0].spec.type }}
      {% if kong_service.resources[0].spec.type == 'LoadBalancer' and kong_service.resources[0].status.loadBalancer.ingress is defined %}
      External IP: {{ kong_service.resources[0].status.loadBalancer.ingress[0].ip | default('pending') }}
      {% endif %}
      {% endif %}
