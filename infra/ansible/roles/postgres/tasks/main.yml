---
# PostgreSQL Role Tasks - Deploy CloudNativePG Cluster

- name: Create PostgreSQL secret
  kubernetes.core.k8s:
    kubeconfig: "{{ k8s_kubeconfig }}"
    state: present
    definition: "{{ lookup('template', 'pg-secret.yaml.j2') | from_yaml }}"

- name: Copy MinIO secret to PostgreSQL namespace for backups
  kubernetes.core.k8s:
    kubeconfig: "{{ k8s_kubeconfig }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: minio-secret
        namespace: "{{ postgres_namespace }}"
      type: Opaque
      data:
        root-user: "{{ minio_root_user | b64encode }}"
        root-password: "{{ minio_root_password | b64encode }}"
        ACCESS_KEY_ID: "{{ minio_root_user | b64encode }}"
        ACCESS_SECRET_KEY: "{{ minio_root_password | b64encode }}"
  when: postgres_backup_enabled | bool

- name: Deploy PostgreSQL Cluster
  kubernetes.core.k8s:
    kubeconfig: "{{ k8s_kubeconfig }}"
    state: present
    definition: "{{ lookup('template', 'cluster.yaml.j2') | from_yaml }}"

- name: Deploy ScheduledBackup
  kubernetes.core.k8s:
    kubeconfig: "{{ k8s_kubeconfig }}"
    state: present
    definition: "{{ lookup('template', 'scheduled-backup.yaml.j2') | from_yaml }}"
  when: postgres_backup_enabled | bool

- name: Wait for PostgreSQL cluster to be ready
  kubernetes.core.k8s_info:
    kubeconfig: "{{ k8s_kubeconfig }}"
    kind: Cluster
    api_version: postgresql.cnpg.io/v1
    namespace: "{{ postgres_namespace }}"
    name: postgres
  register: postgres_cluster
  until: >
    postgres_cluster.resources | length > 0 and
    (postgres_cluster.resources[0].status.phase | default('')) == 'Cluster in healthy state'
  retries: 60
  delay: 10
