---
# Cleanup Playbook - Remove all deployed resources

- name: Cleanup K8s Infrastructure
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - "../group_vars/all.yml"

  pre_tasks:
    - name: Verify kubeconfig exists
      ansible.builtin.stat:
        path: "{{ k8s_kubeconfig }}"
      register: kubeconfig_file
      failed_when: not kubeconfig_file.stat.exists

    - name: Confirm cleanup
      ansible.builtin.debug:
        msg: "⚠️  This will remove all deployed infrastructure!"

  tasks:
    # Remove PostgreSQL Cluster
    - name: Remove ScheduledBackup
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig }}"
        state: absent
        api_version: postgresql.cnpg.io/v1
        kind: ScheduledBackup
        namespace: "{{ postgres_namespace }}"
        name: postgres-daily-backup
      register: remove_backup
      failed_when: false

    - name: Remove PostgreSQL Cluster
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig }}"
        state: absent
        api_version: postgresql.cnpg.io/v1
        kind: Cluster
        namespace: "{{ postgres_namespace }}"
        name: postgres
      register: remove_cluster
      failed_when: false

    - name: Remove PostgreSQL secrets
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig }}"
        state: absent
        kind: Secret
        namespace: "{{ postgres_namespace }}"
        name: "{{ item }}"
      loop:
        - pg-secret
        - minio-secret
      register: remove_pg_secrets
      failed_when: false

    # Uninstall CNPG operator
    - name: Uninstall CNPG Helm release
      kubernetes.core.helm:
        kubeconfig: "{{ k8s_kubeconfig }}"
        name: cnpg
        release_namespace: "{{ cnpg_namespace }}"
        state: absent
      register: uninstall_cnpg
      failed_when: false

    # Uninstall MinIO
    - name: Remove MinIO secret
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig }}"
        state: absent
        kind: Secret
        namespace: "{{ minio_namespace }}"
        name: minio-secret
      register: remove_minio_secret
      failed_when: false

    - name: Uninstall MinIO Helm release
      kubernetes.core.helm:
        kubeconfig: "{{ k8s_kubeconfig }}"
        name: minio
        release_namespace: "{{ minio_namespace }}"
        state: absent
      register: uninstall_minio
      failed_when: false

  post_tasks:
    - name: Cleanup complete
      ansible.builtin.debug:
        msg: |
          ✅ Cleanup completed!

          Removed:
          - PostgreSQL Cluster
          - CloudNativePG Operator
          - MinIO

          Note: Namespaces were preserved.
