---
# Main Deployment Playbook - Deploy all K8s infrastructure

- name: Deploy K8s Infrastructure
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - "../group_vars/all.yml"

  pre_tasks:
    - name: Verify kubeconfig exists
      ansible.builtin.stat:
        path: "{{ k8s_kubeconfig }}"
      register: kubeconfig_file
      failed_when: not kubeconfig_file.stat.exists

    - name: Display deployment info
      ansible.builtin.debug:
        msg: |
          Deploying to Kubernetes cluster
          Kubeconfig: {{ k8s_kubeconfig }}
          Storage Class: {{ k8s_storage_class }}

  roles:
    - role: common
      tags: [common, always]
    - role: minio
      tags: [minio, storage]
    - role: cnpg
      tags: [cnpg, database]
    - role: postgres
      tags: [postgres, database]

  post_tasks:
    - name: Deployment complete
      ansible.builtin.debug:
        msg: |
          ✅ Deployment completed successfully!

          Services deployed:
          - MinIO (namespace: {{ minio_namespace }})
          - CloudNativePG Operator (namespace: {{ cnpg_namespace }})
          - PostgreSQL Cluster (namespace: {{ postgres_namespace }})
