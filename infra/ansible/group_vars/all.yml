---
# Global Ansible Variables for K8s Deployments

# Kubernetes Configuration
k8s_storage_class: longhorn
k8s_wait_timeout: 300

# Helm Chart Versions
minio_helm_version: "17.0.21"
cnpg_helm_version: "0.27.0"
kong_helm_version: "2.48.0"

# Helm Repositories
helm_repositories:
  - name: bitnami
    repo_url: oci://registry-1.docker.io/bitnamicharts
    repo_type: oci
  - name: cnpg
    repo_url: https://cloudnative-pg.github.io/charts
  - name: kong
    repo_url: https://charts.konghq.com

# Namespaces
minio_namespace: minio
cnpg_namespace: cnpg-system
postgres_namespace: postgres
kong_namespace: kong
# CNPG Settings
cnpg_monitoring_enabled: false

# PostgreSQL Image
postgres_image: "ghcr.io/cloudnative-pg/postgresql:18"
