apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minio
  namespace: minio
spec:
  install:
    createNamespace: true
  interval: 5m
  chart:
    spec:
      chart: minio
      version: 17.0.21
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      interval: 1m
  values:
    image:
      registry: docker.io
      repository: bitnamilegacy/minio
      tag: 2025.7.23-debian-12-r5
    console:
      image:
        registry: docker.io
        repository: bitnamilegacy/minio-object-browser
        tag: 2.0.2-debian-12-r4
    auth:
      existingSecret: minio-secret
      rootUser: minioadmin
      rootPassword: minioadmin
    defaultBuckets: default
    persistence:
      enabled: true
      storageClass: "longhorn"
      size: 10Gi
