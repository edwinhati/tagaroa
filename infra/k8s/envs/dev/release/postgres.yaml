apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: postgres
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:18
  primaryUpdateStrategy: unsupervised
  enableSuperuserAccess: true

  storage:
    size: 10Gi
    storageClass: longhorn

  bootstrap:
    initdb:
      database: postgres
      owner: postgres
      secret:
        name: pg-secret

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "256MB"
      effective_cache_size: "512MB"
      work_mem: "8MB"
      maintenance_work_mem: "64MB"
      random_page_cost: "1.1"
      effective_io_concurrency: "200"
      log_statement: "ddl"
      log_min_duration_statement: "1000"

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname

  monitoring:
    enablePodMonitor: true

  backup:
    retentionPolicy: "7d"
    barmanObjectStore:
      destinationPath: "s3://postgres-backups/"
      endpointURL: "http://minio.minio.svc.cluster.local:9000"
      s3Credentials:
        accessKeyId:
          name: minio-secret
          key: root-user
        secretAccessKey:
          name: minio-secret
          key: root-password
      wal:
        compression: snappy
        maxParallel: 8
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: postgres-daily-backup
  namespace: postgres
spec:
  schedule: "0 0 2 * * *"
  backupOwnerReference: self
  immediate: false
  cluster:
    name: postgres