  #       run: make build-servers

  #     - name: Perform CodeQL Analysis
  #       uses: github/codeql-action/analyze@v3

  # =============================================================================
  # DOCKER IMAGE SCANNING
  # =============================================================================
  docker-scan:
    name: Docker Image Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    strategy:
      matrix:
        component: [auth-app, admin-app, auth-server, finance-server]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for scanning
        run: |
          COMPONENT="${{ matrix.component }}"
          if [[ $COMPONENT == *"-app" ]]; then
            APP_NAME=${COMPONENT%-app}
            docker build -f apps/${APP_NAME}/Dockerfile -t ${COMPONENT}:scan .
          else
            SERVER_NAME=${COMPONENT%-server}
            docker build -f servers/${SERVER_NAME}/Dockerfile -t ${COMPONENT}:scan .
          fi

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ matrix.component }}:scan"
          format: "sarif"
          output: "trivy-results-${{ matrix.component }}.sarif"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results-${{ matrix.component }}.sarif"

  # =============================================================================
  # SECRET SCANNING
  # =============================================================================
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run TruffleHog OSS for Pull Requests
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --debug --only-verified

      - name: Run TruffleHog OSS for Push Events
        if: github.event_name == 'push'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --debug --only-verified

      - name: Run TruffleHog OSS for Scheduled Scans
        if: github.event_name == 'schedule'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --debug --only-verified
