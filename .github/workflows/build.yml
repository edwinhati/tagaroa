name: Build

on:
  workflow_call:
    secrets:
      TURBO_TOKEN:
        required: false
      TURBO_TEAM:
        required: false
      SONAR_TOKEN:
        required: false
      SONAR_HOST_URL:
        required: false

env:
  REGISTRY: registry.gitlab.com/tagaroa
  GO_VERSION: "1.23.4"
  BUN_VERSION: "1.3.2"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: go-mod-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: go-mod-${{ runner.os }}-

      - name: Download Go dependencies
        run: |
          for server in servers/*/; do
            if [ -f "$server/go.mod" ]; then
              cd "$server" && go mod download && cd - > /dev/null
            fi
          done
          for pkg in packages/*/go/; do
            if [ -f "$pkg/go.mod" ]; then
              cd "$pkg" && go mod download && cd - > /dev/null
            fi
          done

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Build Bun workspaces
        run: bun run build

      - name: Lint Bun workspaces
        run: bun run lint

      - name: Build Go servers
        run: |
          for server in servers/*/; do
            if [ -f "$server/go.mod" ]; then
              echo "Building $server"
              (cd "$server" && go build ./...)
            fi
          done

      - name: Lint Go servers
        run: |
          for server in servers/*/; do
            if [ -f "$server/go.mod" ]; then
              echo "Linting $server"
              (cd "$server" && go vet ./...)
            fi
          done
