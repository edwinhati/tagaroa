
name: Release

on:
  workflow_call:
    inputs:
      is_main_branch:
        description: "Indicates whether the caller is running on the main branch"
        required: true
        type: boolean
    outputs:
      version:
        description: "Version generated by semantic-release or the pre-release generator"
        value: ${{ jobs.release.outputs.version || jobs.pre-release-version.outputs.version }}
      released:
        description: "True when semantic-release published a new release"
        value: ${{ jobs.release.outputs.released }}

env:
  NODE_VERSION: "18"

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: inputs.is_main_branch
    outputs:
      version: ${{ steps.semantic-release.outputs.version }}
      released: ${{ steps.semantic-release.outputs.released }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install semantic-release
        run: |
          npm install -g semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/github

      - name: Create semantic release
        id: semantic-release
        run: |
          npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pre-release-version:
    name: Generate Pre-release Version
    runs-on: ubuntu-latest
    if: ${{ !inputs.is_main_branch }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate pre-release version
        id: version
        run: |
          # Get the latest tag from git, fallback to 0.1.0 if no tags exist
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.1.0")
          echo "Latest tag found: ${LATEST_TAG}"

          # Remove 'v' prefix if present
          LATEST_VERSION=${LATEST_TAG#v}

          # Parse version components, handle cases where version might not be semantic
          if [[ $LATEST_VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
          else
            # If no valid semantic version found, start with 0.1.0
            MAJOR=0
            MINOR=1
            PATCH=0
          fi

          # Calculate next version - increment minor for pre-releases
          NEXT_MINOR=$((MINOR + 1))
          NEXT_VERSION="${MAJOR}.${NEXT_MINOR}.0"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # For PRs: 1.2.0-beta.pr123.abc1234
            PR_NUMBER="${{ github.event.pull_request.number }}"
            VERSION="${NEXT_VERSION}-beta.pr${PR_NUMBER}.${GITHUB_SHA::8}"
          else
            # For other branches: 1.2.0-alpha.feature-branch.abc1234
            BRANCH_NAME=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]')
            VERSION="${NEXT_VERSION}-alpha.${BRANCH_NAME}.${GITHUB_SHA::8}"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Generated pre-release version: ${VERSION}"
