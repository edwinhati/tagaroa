name: Deploy

on:
  workflow_call:
    inputs:
      version:
        description: "Version string produced by the release workflow"
        required: false
        type: string
      is_main_branch:
        description: "Indicates whether the caller is running on the main branch"
        required: true
        type: boolean
      released:
        description: "True when a production release was published; used to skip redundant deploys"
        required: false
        default: false
        type: boolean

env:
  REGISTRY: registry.gitlab.com/tagaroa
  BUN_VERSION: "1.3.1"
  GO_VERSION: "1.23.4"

jobs:
  build-and-push:
    name: Build & Push ${{ matrix.component }}
    runs-on: ubuntu-latest
    if: ${{ inputs.released || !inputs.is_main_branch }}
    environment:
      name: ${{ inputs.is_main_branch && 'production' || 'preview' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: auth-app
            dockerfile: apps/auth/Dockerfile
            runtime: bun
          - component: admin-app
            dockerfile: apps/admin/Dockerfile
            runtime: bun
          - component: finance-app
            dockerfile: apps/finance/Dockerfile
            runtime: bun
          - component: auth-server
            dockerfile: servers/auth/Dockerfile
            runtime: bun
          - component: finance-server
            dockerfile: servers/finance/Dockerfile
            runtime: go
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        if: ${{ matrix.runtime == 'bun' }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Go
        if: ${{ matrix.runtime == 'go' }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ${{ matrix.runtime == 'bun' && '~/.bun/install/cache' || '~/go/pkg/mod' }}
          key: ${{ matrix.runtime == 'bun' && format('bun-{0}-{1}', runner.os, hashFiles('**/bun.lock')) || format('go-{0}-{1}', runner.os, hashFiles('**/go.sum')) }}
          restore-keys: ${{ matrix.runtime == 'bun' && format('bun-{0}-', runner.os) || format('go-{0}-', runner.os) }}

      - name: Install dependencies
        if: ${{ matrix.runtime == 'bun' }}
        run: bun install

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        id: meta
        env:
          VERSION: ${{ inputs.version }}
          IS_MAIN: ${{ inputs.is_main_branch }}
        run: |
          set -euo pipefail
          COMPONENT="${{ matrix.component }}"
          VERSION_VALUE="${VERSION:-}"
          TAGS=""

          if [[ "${IS_MAIN}" == "true" && -n "${VERSION_VALUE}" && "${VERSION_VALUE}" != "null" ]]; then
            TAGS="${REGISTRY}/${COMPONENT}:${VERSION_VALUE}"
            TAGS="${TAGS},${REGISTRY}/${COMPONENT}:latest"
            TAGS="${TAGS},${REGISTRY}/${COMPONENT}:${VERSION_VALUE}-${GITHUB_SHA::8}"
          elif [[ -n "${VERSION_VALUE}" && "${VERSION_VALUE}" != "null" ]]; then
            TAGS="${REGISTRY}/${COMPONENT}:${VERSION_VALUE}"
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              TAGS="${TAGS},${REGISTRY}/${COMPONENT}:beta"
              TAGS="${TAGS},${REGISTRY}/${COMPONENT}:beta-${GITHUB_SHA::8}"
            else
              TAGS="${TAGS},${REGISTRY}/${COMPONENT}:alpha"
              TAGS="${TAGS},${REGISTRY}/${COMPONENT}:alpha-${GITHUB_SHA::8}"
            fi
          else
            if [[ "${IS_MAIN}" == "true" ]]; then
              TAGS="${REGISTRY}/${COMPONENT}:latest"
              TAGS="${TAGS},${REGISTRY}/${COMPONENT}:latest-${GITHUB_SHA::8}"
            else
              if [[ "${{ github.event_name }}" == "pull_request" ]]; then
                SUFFIX="beta"
              else
                SUFFIX="alpha"
              fi
              TAGS="${REGISTRY}/${COMPONENT}:${SUFFIX}"
              TAGS="${TAGS},${REGISTRY}/${COMPONENT}:${SUFFIX}-${GITHUB_SHA::8}"
            fi
          fi

          echo "image-tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GITLAB_USERNAME }}
          password: ${{ secrets.GITLAB_TOKEN }}

      - name: Prepare build args
        id: build-args
        run: |
          DEPLOY_ENV="${{ inputs.is_main_branch && 'production' || 'preview' }}"
          cat <<EOF >> "$GITHUB_OUTPUT"
          build-args<<PARAMS
          DEPLOY_ENV=${DEPLOY_ENV}
          VCS_REF=${GITHUB_SHA}
          PARAMS
          EOF

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.image-tags }}
          build-args: ${{ steps.build-args.outputs.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
