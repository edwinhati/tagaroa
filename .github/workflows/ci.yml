name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, "feature/**", "hotfix/**"]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: registry.gitlab.com/tagaroa
  NODE_VERSION: "18"
  GO_VERSION: "1.23.4"
  BUN_VERSION: "1.3.1"

jobs:
  # =============================================================================
  # QUALITY CHECKS (PARALLEL)
  # =============================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: go-mod-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: go-mod-${{ runner.os }}-

      - name: Download Go dependencies
        run: |
          for server in servers/*/; do
            if [ -f "$server/go.mod" ]; then
              cd "$server" && go mod download && cd - > /dev/null
            fi
          done
          for pkg in packages/*/go/; do
            if [ -f "$pkg/go.mod" ]; then
              cd "$pkg" && go mod download && cd - > /dev/null
            fi
          done

      - name: Run Go tests
        run: make test-servers

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Run linting
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bunx turbo run lint --affected
          else
            bunx turbo run lint
          fi
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

      - name: Run type checking
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bunx turbo run check-types --affected
          else
            bunx turbo run check-types
          fi
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

  # =============================================================================
  # VERSIONING
  # =============================================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.semantic-release.outputs.version }}
      released: ${{ steps.semantic-release.outputs.released }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install semantic-release
        run: |
          npm install -g semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/github

      - name: Create semantic release
        id: semantic-release
        run: |
          npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pre-release-version:
    name: Generate Pre-release Version
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: (github.event_name == 'push' && github.ref != 'refs/heads/main') || github.event_name == 'pull_request'
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install semantic-release
        run: |
          npm install -g semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/github

      - name: Generate pre-release version
        id: version
        run: |
          # Get the next version without releasing
          NEXT_VERSION=$(npx semantic-release --dry-run --no-ci | grep -oP 'The next release version is \K[0-9]+\.[0-9]+\.[0-9]+' || echo "0.0.0")

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # For PRs: v1.2.3-beta.pr123.abc1234
            PR_NUMBER="${{ github.event.pull_request.number }}"
            VERSION="${NEXT_VERSION}-beta.pr${PR_NUMBER}.${GITHUB_SHA::8}"
          else
            # For other branches: v1.2.3-alpha.feature-branch.abc1234
            BRANCH_NAME=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]')
            VERSION="${NEXT_VERSION}-alpha.${BRANCH_NAME}.${GITHUB_SHA::8}"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Generated pre-release version: ${VERSION}"

  # =============================================================================
  # BUILD & DOCKER (OPTIMIZED)
  # =============================================================================
  build-and-docker-main:
    name: Build & Docker (Main)
    runs-on: ubuntu-latest
    needs: [test, lint, release]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - component: auth-app
            dockerfile: apps/auth/Dockerfile
            build_cmd: "cd apps/auth && bun run build"
          - component: admin-app
            dockerfile: apps/admin/Dockerfile
            build_cmd: "cd apps/admin && bun run build"
          - component: finance-app
            dockerfile: apps/finance/Dockerfile
            build_cmd: "cd apps/finance && bun run build"
          - component: auth-server
            dockerfile: servers/auth/Dockerfile
            build_cmd: "make build-auth-server"
          - component: finance-server
            dockerfile: servers/finance/Dockerfile
            build_cmd: "make build-finance-server"
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
        if: contains(matrix.component, '-app')

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
        if: contains(matrix.component, '-server')

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/go/pkg/mod
            node_modules
          key: ${{ contains(matrix.component, '-app') && format('bun-{0}-{1}', runner.os, hashFiles('**/bun.lock')) || format('go-{0}-{1}', runner.os, hashFiles('**/go.sum')) }}
          restore-keys: |
            ${{ contains(matrix.component, '-app') && format('bun-{0}-', runner.os) || format('go-{0}-', runner.os) }}

      - name: Install dependencies
        run: bun install
        if: contains(matrix.component, '-app')

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        id: meta
        run: |
          COMPONENT="${{ matrix.component }}"
          SEMANTIC_VERSION="${{ needs.release.outputs.version }}"

          if [ -n "$SEMANTIC_VERSION" ] && [ "$SEMANTIC_VERSION" != "null" ]; then
            # Use semantic version for main branch
            TAGS="${REGISTRY}/${COMPONENT}:${SEMANTIC_VERSION}"
            TAGS="${TAGS},${{ env.REGISTRY }}/${COMPONENT}:latest"
            TAGS="${TAGS},${{ env.REGISTRY }}/${COMPONENT}:${SEMANTIC_VERSION}-${GITHUB_SHA::8}"
          else
            # Fallback to latest if no semantic version
            TAGS="${REGISTRY}/${COMPONENT}:latest"
            TAGS="${TAGS},${{ env.REGISTRY }}/${COMPONENT}:latest-${GITHUB_SHA::8}"
          fi

          echo "image-tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Log in to GitLab Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GITLAB_USERNAME }}
          password: ${{ secrets.GITLAB_TOKEN }}

      - name: Prepare build args for Next.js apps
        id: build-args
        run: |
          COMPONENT="${{ matrix.component }}"
          BUILD_ARGS=""
          if [[ $COMPONENT == *"-app" ]]; then
            APP_NAME=${COMPONENT%-app}
            case $APP_NAME in
              "auth")
                BUILD_ARGS="NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}"$'\n'
                BUILD_ARGS="${BUILD_ARGS}NEXT_PUBLIC_DASHBOARD_APP_URL=${{ vars.NEXT_PUBLIC_DASHBOARD_APP_URL }}"$'\n'
                BUILD_ARGS="${BUILD_ARGS}NEXT_PUBLIC_ALLOWED_REDIRECT_ORIGINS=${{ vars.NEXT_PUBLIC_ALLOWED_REDIRECT_ORIGINS }}"$'\n'
                BUILD_ARGS="${BUILD_ARGS}NEXT_PUBLIC_POSTHOG_KEY=${{ vars.NEXT_PUBLIC_POSTHOG_KEY }}"$'\n'
                BUILD_ARGS="${BUILD_ARGS}NEXT_PUBLIC_POSTHOG_HOST=${{ vars.NEXT_PUBLIC_POSTHOG_HOST }}"$'\n'
                ;;
              "admin")
                BUILD_ARGS="NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}"$'\n'
                BUILD_ARGS="${BUILD_ARGS}NEXT_PUBLIC_AUTH_APP_URL=${{ vars.NEXT_PUBLIC_AUTH_APP_URL }}"$'\n'
                BUILD_ARGS="${BUILD_ARGS}NEXT_PUBLIC_DASHBOARD_APP_URL=${{ vars.NEXT_PUBLIC_DASHBOARD_APP_URL }}"$'\n'
                BUILD_ARGS="${BUILD_ARGS}NEXT_PUBLIC_POSTHOG_KEY=${{ vars.NEXT_PUBLIC_POSTHOG_KEY }}"$'\n'
                BUILD_ARGS="${BUILD_ARGS}NEXT_PUBLIC_POSTHOG_HOST=${{ vars.NEXT_PUBLIC_POSTHOG_HOST }}"$'\n'
                ;;
              "finance")
                BUILD_ARGS="NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}"$'\n'
                BUILD_ARGS="${BUILD_ARGS}NEXT_PUBLIC_MAIN_APP_URL=${{ vars.NEXT_PUBLIC_MAIN_APP_URL }}"$'\n'
                BUILD_ARGS="${BUILD_ARGS}NEXT_PUBLIC_AUTH_APP_URL=${{ vars.NEXT_PUBLIC_AUTH_APP_URL }}"$'\n'
                BUILD_ARGS="${BUILD_ARGS}NEXT_PUBLIC_POSTHOG_KEY=${{ vars.NEXT_PUBLIC_POSTHOG_KEY }}"$'\n'
                BUILD_ARGS="${BUILD_ARGS}NEXT_PUBLIC_POSTHOG_HOST=${{ vars.NEXT_PUBLIC_POSTHOG_HOST }}"$'\n'
                ;;
            esac
          fi
          echo "build-args<<EOF" >> $GITHUB_OUTPUT
          echo "$BUILD_ARGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        timeout-minutes: 15
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.image-tags }}
          build-args: ${{ steps.build-args.outputs.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  build-and-docker-other:
    name: Build & Docker (Other Branches)
    runs-on: ubuntu-latest
    needs: [test, lint, pre-release-version]
    if: (github.event_name == 'push' && github.ref != 'refs/heads/main') || github.event_name == 'pull_request'
    strategy:
      matrix:
        include:
          - component: auth-app
            dockerfile: apps/auth/Dockerfile
            build_cmd: "cd apps/auth && bun run build"
          - component: admin-app
            dockerfile: apps/admin/Dockerfile
            build_cmd: "cd apps/admin && bun run build"
          - component: finance-app
            dockerfile: apps/finance/Dockerfile
            build_cmd: "cd apps/finance && bun run build"
          - component: auth-server
            dockerfile: servers/auth/Dockerfile
            build_cmd: "make build-auth-server"
          - component: finance-server
            dockerfile: servers/finance/Dockerfile
            build_cmd: "make build-finance-server"
    environment:
      name: ${{ github.event_name == 'pull_request' && 'staging' || 'development' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
        if: contains(matrix.component, '-app')

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
        if: contains(matrix.component, '-server')

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/go/pkg/mod
            node_modules
          key: ${{ contains(matrix.component, '-app') && format('bun-{0}-{1}', runner.os, hashFiles('**/bun.lock')) || format('go-{0}-{1}', runner.os, hashFiles('**/go.sum')) }}
          restore-keys: |
            ${{ contains(matrix.component, '-app') && format('bun-{0}-', runner.os) || format('go-{0}-', runner.os) }}

      - name: Install dependencies
        run: bun install
        if: contains(matrix.component, '-app')

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        id: meta
        run: |
          COMPONENT="${{ matrix.component }}"
          PRE_RELEASE_VERSION="${{ needs.pre-release-version.outputs.version }}"

          if [ -n "$PRE_RELEASE_VERSION" ] && [ "$PRE_RELEASE_VERSION" != "null" ]; then
            # Use semantic pre-release version
            TAGS="${REGISTRY}/${COMPONENT}:${PRE_RELEASE_VERSION}"
            
            # Also add traditional tags for backward compatibility
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              TAGS="${TAGS},${{ env.REGISTRY }}/${COMPONENT}:beta"
              TAGS="${TAGS},${{ env.REGISTRY }}/${COMPONENT}:beta-${GITHUB_SHA::8}"
            else
              TAGS="${TAGS},${{ env.REGISTRY }}/${COMPONENT}:alpha"
              TAGS="${TAGS},${{ env.REGISTRY }}/${COMPONENT}:alpha-${GITHUB_SHA::8}"
            fi
          else
            # Fallback to traditional tags
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              TAG_SUFFIX="beta"
            else
              TAG_SUFFIX="alpha"
            fi
            TAGS="${REGISTRY}/${COMPONENT}:${TAG_SUFFIX}"
            TAGS="${TAGS},${{ env.REGISTRY }}/${COMPONENT}:${TAG_SUFFIX}-${GITHUB_SHA::8}"
          fi

          echo "image-tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Log in to GitLab Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GITLAB_USERNAME }}
          password: ${{ secrets.GITLAB_TOKEN }}

      - name: Prepare build args for Next.js apps
        id: build-args
        run: |
          COMPONENT="${{ matrix.component }}"
          BUILD_ARGS=""
          if [[ $COMPONENT == *"-app" ]]; then
            APP_NAME=${COMPONENT%-app}
            case $APP_NAME in
              "auth")
                BUILD_ARGS="NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}"$'\n'
                BUILD_ARGS="${BUILD_ARGS}NEXT_PUBLIC_DASHBOARD_APP_URL=${{ vars.NEXT_PUBLIC_DASHBOARD_APP_URL }}"$'\n'
                BUILD_ARGS="${BUILD_ARGS}NEXT_PUBLIC_ALLOWED_REDIRECT_ORIGINS=${{ vars.NEXT_PUBLIC_ALLOWED_REDIRECT_ORIGINS }}"$'\n'
                BUILD_ARGS="${BUILD_ARGS}NEXT_PUBLIC_POSTHOG_KEY=${{ vars.NEXT_PUBLIC_POSTHOG_KEY }}"$'\n'
                BUILD_ARGS="${BUILD_ARGS}NEXT_PUBLIC_POSTHOG_HOST=${{ vars.NEXT_PUBLIC_POSTHOG_HOST }}"$'\n'
                ;;
              "admin")
                BUILD_ARGS="NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}"$'\n'
                BUILD_ARGS="${BUILD_ARGS}NEXT_PUBLIC_AUTH_APP_URL=${{ vars.NEXT_PUBLIC_AUTH_APP_URL }}"$'\n'
                BUILD_ARGS="${BUILD_ARGS}NEXT_PUBLIC_DASHBOARD_APP_URL=${{ vars.NEXT_PUBLIC_DASHBOARD_APP_URL }}"$'\n'
                BUILD_ARGS="${BUILD_ARGS}NEXT_PUBLIC_POSTHOG_KEY=${{ vars.NEXT_PUBLIC_POSTHOG_KEY }}"$'\n'
                BUILD_ARGS="${BUILD_ARGS}NEXT_PUBLIC_POSTHOG_HOST=${{ vars.NEXT_PUBLIC_POSTHOG_HOST }}"$'\n'
                ;;
              "finance")
                BUILD_ARGS="NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}"$'\n'
                BUILD_ARGS="${BUILD_ARGS}NEXT_PUBLIC_MAIN_APP_URL=${{ vars.NEXT_PUBLIC_MAIN_APP_URL }}"$'\n'
                BUILD_ARGS="${BUILD_ARGS}NEXT_PUBLIC_AUTH_APP_URL=${{ vars.NEXT_PUBLIC_AUTH_APP_URL }}"$'\n'
                BUILD_ARGS="${BUILD_ARGS}NEXT_PUBLIC_POSTHOG_KEY=${{ vars.NEXT_PUBLIC_POSTHOG_KEY }}"$'\n'
                BUILD_ARGS="${BUILD_ARGS}NEXT_PUBLIC_POSTHOG_HOST=${{ vars.NEXT_PUBLIC_POSTHOG_HOST }}"$'\n'
                ;;
            esac
          fi
          echo "build-args<<EOF" >> $GITHUB_OUTPUT
          echo "$BUILD_ARGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        timeout-minutes: 15
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.image-tags }}
          build-args: ${{ steps.build-args.outputs.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # =============================================================================
  # CLEANUP
  # =============================================================================
  cleanup:
    name: Cleanup Artifacts
    runs-on: ubuntu-latest
    needs:
      [
        build-and-docker-main,
        build-and-docker-other,
        release,
        pre-release-version,
      ]
    if: always()
    steps:
      - name: Delete artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            build-artifacts
