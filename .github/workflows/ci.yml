name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, "feature/**", "hotfix/**"]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: registry.gitlab.com/tagaroa
  NODE_VERSION: "18"
  GO_VERSION: "1.25.0"
  BUN_VERSION: "1.3.1"

jobs:
  # =============================================================================
  # SETUP & CACHE
  # =============================================================================
  setup:
    name: Setup Dependencies
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-keys.outputs.cache-key }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Generate cache keys
        id: cache-keys
        run: |
          echo "cache-key=deps-${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}-go-${{ hashFiles('**/go.sum') }}" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/go/pkg/mod
            node_modules
          key: ${{ steps.cache-keys.outputs.cache-key }}
          restore-keys: |
            deps-${{ runner.os }}-bun-
            deps-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

  # =============================================================================
  # TESTING
  # =============================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Run Go tests
        run: make test-servers

  # =============================================================================
  # LINTING & TYPE CHECKING
  # =============================================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Install dependencies
        run: bun install

      - name: Run linting
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bunx turbo run lint --affected
          else
            bunx turbo run lint
          fi
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

      - name: Run type checking
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bunx turbo run check-types --affected
          else
            bunx turbo run check-types
          fi
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

  # =============================================================================
  # BUILD
  # =============================================================================
  build:
    name: Build Applications
    runs-on: ubuntu-latest
    needs: [setup, test, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/go/pkg/mod
            node_modules
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Install dependencies
        run: bun install

      - name: Build applications
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bunx turbo run build --affected
          else
            bunx turbo run build
          fi
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

      - name: Build Go servers
        run: make build-servers

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            build/
            apps/*/.next/
            apps/*/dist/
            packages/*/dist/
          retention-days: 1

  # =============================================================================
  # DOCKER BUILD
  # =============================================================================
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    strategy:
      matrix:
        include:
          - component: auth-app
            dockerfile: apps/auth/Dockerfile
          - component: admin-app
            dockerfile: apps/admin/Dockerfile
          - component: auth-server
            dockerfile: servers/auth/Dockerfile
          - component: finance-server
            dockerfile: servers/finance/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Generate image tags
        id: meta
        run: |
          COMPONENT="${{ matrix.component }}"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ENVIRONMENT="staging"
            TAG_SUFFIX="beta"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENVIRONMENT="production"
            TAG_SUFFIX="latest"
          else
            ENVIRONMENT="dev"
            TAG_SUFFIX="alpha"
          fi

          echo "environment=${ENVIRONMENT}" >> $GITHUB_OUTPUT
          echo "image-tag=${REGISTRY}/${COMPONENT}:${TAG_SUFFIX}" >> $GITHUB_OUTPUT
          echo "image-tag-sha=${REGISTRY}/${COMPONENT}:${TAG_SUFFIX}-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Log in to GitLab Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GITLAB_USERNAME }}
          password: ${{ secrets.GITLAB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image-tag }}
            ${{ steps.meta.outputs.image-tag-sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =============================================================================
  # CLEANUP
  # =============================================================================
  cleanup:
    name: Cleanup Artifacts
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: always()
    steps:
      - name: Delete artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            build-artifacts
