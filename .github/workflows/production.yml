name: Production Pipeline

on:
  push:
    branches:
      - main

env:
  REGISTRY: registry.gitlab.com/tagaroa
  BUN_VERSION: "1.3.12"
  ENVIRONMENT: production
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  build:
    name: Build (${{ matrix.task }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [build, lint, check-types, knip]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            .turbo
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install

      - name: Run ${{ matrix.task }}
        run: |
          if [ "${{ matrix.task }}" = "knip" ]; then
            bunx knip --no-progress
          else
            bun run ${{ matrix.task }}
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            .turbo
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install

      - name: Run tests
        run: bun run test

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      pull-requests: write
    outputs:
      released: ${{ steps.tag_release.outputs.released }}
      version: ${{ steps.tag_release.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install

      - uses: changesets/action@v1
        with:
          version: bun run version
          title: "ci: version bump"
          commit: "ci: version bump"
          branch: main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - id: tag_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if [[ "$COMMIT_MESSAGE" == "ci: version bump"* ]]; then
            SCRIPT_OUT=$(bash .github/scripts/detect-version-bumps.sh)
            echo "$SCRIPT_OUT" >> $GITHUB_OUTPUT
          else
            echo "released=false" >> $GITHUB_OUTPUT
            echo "version=" >> $GITHUB_OUTPUT
          fi

  deploy:
    name: Deploy (${{ matrix.component }})
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released == 'true'
    environment:
      name: production
      url: https://tagaroa.edwinhati.work
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: finance-app
            dockerfile: apps/finance/Dockerfile
            sentry_project: finance-app
          - component: auth-app
            dockerfile: apps/auth/Dockerfile
            sentry_project: auth-app
          - component: web-app
            dockerfile: apps/web/Dockerfile
            sentry_project: web-app
          - component: admin-app
            dockerfile: apps/admin/Dockerfile
            sentry_project: admin-app
          - component: investment-app
            dockerfile: apps/investment/Dockerfile
            sentry_project: investment-app
          - component: core-service
            dockerfile: servers/core/Dockerfile
            sentry_project: core-service
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Sentry DSN
        id: vars
        run: |
          case "${{ matrix.component }}" in
            finance-app)    echo "sentry_dsn=${{ secrets.FINANCE_APP_SENTRY_DSN }}" >> $GITHUB_OUTPUT ;;
            auth-app)       echo "sentry_dsn=${{ secrets.AUTH_APP_SENTRY_DSN }}" >> $GITHUB_OUTPUT ;;
            web-app)        echo "sentry_dsn=${{ secrets.WEB_APP_SENTRY_DSN }}" >> $GITHUB_OUTPUT ;;
            admin-app)      echo "sentry_dsn=${{ secrets.ADMIN_APP_SENTRY_DSN }}" >> $GITHUB_OUTPUT ;;
            investment-app) echo "sentry_dsn=${{ secrets.INVESTMENT_APP_SENTRY_DSN }}" >> $GITHUB_OUTPUT ;;
          esac

      - uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        id: meta
        run: |
          COMPONENT="${{ matrix.component }}"
          VERSION="${{ needs.release.outputs.version }}"
          TAGS="${{ env.REGISTRY }}/${COMPONENT}:${VERSION}"
          TAGS="${TAGS},${{ env.REGISTRY }}/${COMPONENT}:latest"
          TAGS="${TAGS},${{ env.REGISTRY }}/${COMPONENT}:${GITHUB_SHA::8}"
          echo "image-tags=${TAGS}" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GITLAB_USERNAME }}
          password: ${{ secrets.GITLAB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.image-tags }}
          build-args: |
            DEPLOY_ENV=production
            VCS_REF=${{ github.sha }}
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_AUTH_APP_URL=${{ vars.NEXT_PUBLIC_AUTH_APP_URL }}
            NEXT_PUBLIC_DASHBOARD_APP_URL=${{ vars.NEXT_PUBLIC_DASHBOARD_APP_URL }}
            NEXT_PUBLIC_MAIN_APP_URL=${{ vars.NEXT_PUBLIC_MAIN_APP_URL }}
            NEXT_PUBLIC_ALLOWED_REDIRECT_ORIGINS=${{ vars.NEXT_PUBLIC_ALLOWED_REDIRECT_ORIGINS }}
            NEXT_PUBLIC_SENTRY_DSN=${{ steps.vars.outputs.sentry_dsn }}
            NEXT_PUBLIC_SENTRY_ENVIRONMENT=${{ vars.NEXT_PUBLIC_SENTRY_ENVIRONMENT }}
            NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE=${{ vars.NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Create Sentry Release
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
        with:
          environment: production
          release: ${{ needs.release.outputs.version }}
          set_commits: auto
          projects: ${{ matrix.sentry_project }}
