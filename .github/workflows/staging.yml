name: Staging Pipeline

on:
  push:
    branches:
      - staging
  pull_request:
    branches:
      - main

env:
  REGISTRY: registry.gitlab.com/tagaroa
  BUN_VERSION: "1.3.11"
  ENVIRONMENT: staging
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  quality:
    name: ${{ matrix.check }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [build, lint, type-check, test]
        include:
          - check: build
            command: bun run build
          - check: lint
            command: bun run lint
          - check: type-check
            command: bun run check-types
          - check: test
            command: bun run test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: ${{ matrix.check }}
        run: ${{ matrix.command }}

  release:
    name: Release (Beta)
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push'
    permissions:
      contents: write
    outputs:
      version: ${{ steps.snapshot.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install

      - id: snapshot
        name: Create beta snapshot version
        run: |
          bun changeset version --snapshot beta
          VERSION=$(node -p "require('./apps/finance/package.json').version")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Generated beta snapshot: ${VERSION}"

      - name: Create pre-release tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.snapshot.outputs.version }}
          TAG="v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Beta pre-release ${TAG}"
          git push origin "${TAG}"
          gh release create "${TAG}" \
            --title "Beta ${TAG}" \
            --generate-notes \
            --prerelease

  deploy:
    name: Deploy (${{ matrix.component }})
    runs-on: ubuntu-latest
    needs: [quality, release]
    if: github.event_name == 'push'
    environment:
      name: staging
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: web-app
            dockerfile: apps/web/Dockerfile
          - component: auth-app
            dockerfile: apps/auth/Dockerfile
          - component: admin-app
            dockerfile: apps/admin/Dockerfile
          - component: finance-app
            dockerfile: apps/finance/Dockerfile
          - component: core-service
            dockerfile: servers/core/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        id: meta
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          COMPONENT="${{ matrix.component }}"
          TAGS="${{ env.REGISTRY }}/${COMPONENT}:${VERSION}"
          TAGS="${TAGS},${{ env.REGISTRY }}/${COMPONENT}:staging"
          TAGS="${TAGS},${{ env.REGISTRY }}/${COMPONENT}:staging-${GITHUB_SHA::8}"
          echo "image-tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GITLAB_USERNAME }}
          password: ${{ secrets.GITLAB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.image-tags }}
          build-args: |
            DEPLOY_ENV=staging
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
