name: Staging Pipeline

on:
  push:
    branches:
      - development
  pull_request:
    branches:
      - main

env:
  REGISTRY: registry.gitlab.com/tagaroa
  BUN_VERSION: "1.3.12"
  ENVIRONMENT: staging
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      fallback: ${{ steps.detect.outputs.fallback }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install
      - id: detect
        run: bash .github/scripts/detect-changed-apps.sh >> $GITHUB_OUTPUT

  build:
    name: Build (${{ matrix.task }})
    runs-on: ubuntu-latest
    needs: detect-changes
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        task: [build, lint, check-types]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            .turbo
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install

      - name: Run ${{ matrix.task }}
        run: bun turbo run ${{ matrix.task }} --filter="...[origin/main]"
            
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            .turbo
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install

      - name: Run tests
        run: bun turbo run test --filter="...[origin/main]"

  deploy:
    name: Deploy (${{ matrix.component }})
    runs-on: ubuntu-latest
    needs: [test, detect-changes]
    if: github.event_name == 'push'
    environment:
      name: staging
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        id: meta
        run: |
          COMPONENT="${{ matrix.component }}"
          TAGS="${{ env.REGISTRY }}/${COMPONENT}:beta"
          TAGS="${TAGS},${{ env.REGISTRY }}/${COMPONENT}:${GITHUB_SHA::8}"
          echo "image-tags=${TAGS}" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GITLAB_USERNAME }}
          password: ${{ secrets.GITLAB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.image-tags }}
          build-args: |
            DEPLOY_ENV=staging
            VCS_REF=${{ github.sha }}
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_AUTH_APP_URL=${{ vars.NEXT_PUBLIC_AUTH_APP_URL }}
            NEXT_PUBLIC_DASHBOARD_APP_URL=${{ vars.NEXT_PUBLIC_DASHBOARD_APP_URL }}
            NEXT_PUBLIC_MAIN_APP_URL=${{ vars.NEXT_PUBLIC_MAIN_APP_URL }}
            NEXT_PUBLIC_ALLOWED_REDIRECT_ORIGINS=${{ vars.NEXT_PUBLIC_ALLOWED_REDIRECT_ORIGINS }}
            NEXT_PUBLIC_SENTRY_DSN=${{ matrix.sentry_dsn }}
            NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE=${{ vars.NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64