name: Staging Pipeline

on:
  push:
    branches:
      - staging
  pull_request:
    branches:
      - main

env:
  REGISTRY: registry.gitlab.com/tagaroa
  GO_VERSION: "1.24.0"
  BUN_VERSION: "1.3.5"
  ENVIRONMENT: staging

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: go-mod-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: go-mod-${{ runner.os }}-

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Download Go dependencies
        run: |
          for server in servers/*/; do
            if [ -f "$server/go.mod" ]; then
              cd "$server" && go mod download && cd - > /dev/null
            fi
          done
          for pkg in packages/*/go/; do
            if [ -f "$pkg/go.mod" ]; then
              cd "$pkg" && go mod download && cd - > /dev/null
            fi
          done

      - name: Install Bun dependencies
        run: bun install

      - name: Build Bun workspaces
        run: bun run build

      - name: Build Go servers
        run: |
          for server in servers/*/; do
            if [ -f "$server/go.mod" ]; then
              echo "Building $server"
              (cd "$server" && go build ./...)
            fi
          done

      - name: Lint Bun workspaces
        run: bun run lint

      - name: Lint Go servers
        run: |
          for server in servers/*/; do
            if [ -f "$server/go.mod" ]; then
              echo "Linting $server"
              (cd "$server" && go vet ./...)
            fi
          done

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: go-mod-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: go-mod-${{ runner.os }}-

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install Bun dependencies
        run: bun install

      - name: Run Bun tests
        run: bun test

      - name: Run Go tests
        run: |
          for server in servers/*/; do
            if [ -f "$server/go.mod" ]; then
              echo "Testing $server"
              (cd "$server" && go test ./...)
            fi
          done

      - name: Generate Bun coverage
        run: bun test --coverage

      - name: Generate Go coverage
        run: |
          for server in servers/*/; do
            if [ -f "$server/go.mod" ]; then
              echo "Running coverage for $server"
              (cd "$server" && go test ./... -coverprofile=coverage.out)
            fi
          done

  version:
    name: Generate Version
    runs-on: ubuntu-latest
    needs: [build, test]
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate staging version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.1.0")
          echo "Latest tag found: ${LATEST_TAG}"

          LATEST_VERSION=${LATEST_TAG#v}

          if [[ $LATEST_VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
          else
            MAJOR=0
            MINOR=1
            PATCH=0
          fi

          NEXT_MINOR=$((MINOR + 1))
          NEXT_VERSION="${MAJOR}.${NEXT_MINOR}.0"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            VERSION="${NEXT_VERSION}-beta.pr${PR_NUMBER}.${GITHUB_SHA::8}"
          else
            VERSION="${NEXT_VERSION}-beta.${GITHUB_SHA::8}"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Generated staging version: ${VERSION}"

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, test, version]
    if: github.event_name == 'push'
    environment:
      name: staging
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: web-app
            dockerfile: apps/web/Dockerfile
            runtime: bun
          - component: auth-app
            dockerfile: apps/auth/Dockerfile
            runtime: bun
          - component: admin-app
            dockerfile: apps/admin/Dockerfile
            runtime: bun
          - component: finance-app
            dockerfile: apps/finance/Dockerfile
            runtime: bun
          - component: auth-server
            dockerfile: servers/auth/Dockerfile
            runtime: bun
          - component: finance-server
            dockerfile: servers/finance/Dockerfile
            runtime: go
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Go
        if: matrix.runtime == 'go'
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ${{ matrix.runtime == 'bun' && '~/.bun/install/cache' || '~/go/pkg/mod' }}
          key: ${{ matrix.runtime == 'bun' && format('bun-{0}-{1}', runner.os, hashFiles('**/bun.lock')) || format('go-{0}-{1}', runner.os, hashFiles('**/go.sum')) }}
          restore-keys: ${{ matrix.runtime == 'bun' && format('bun-{0}-', runner.os) || format('go-{0}-', runner.os) }}

      - name: Install dependencies
        if: matrix.runtime == 'bun'
        run: bun install

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        id: meta
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          COMPONENT="${{ matrix.component }}"
          TAGS="${{ env.REGISTRY }}/${COMPONENT}:${VERSION}"
          TAGS="${TAGS},${{ env.REGISTRY }}/${COMPONENT}:staging"
          TAGS="${TAGS},${{ env.REGISTRY }}/${COMPONENT}:staging-${GITHUB_SHA::8}"
          echo "image-tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GITLAB_USERNAME }}
          password: ${{ secrets.GITLAB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.image-tags }}
          build-args: |
            DEPLOY_ENV=staging
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
