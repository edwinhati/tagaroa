name: Development Pipeline

on:
  push:
    branches:
      - develop
      - "feature/**"
  pull_request:
    branches:
      - develop

env:
  REGISTRY: registry.gitlab.com/tagaroa
  BUN_VERSION: "1.3.9"
  ENVIRONMENT: development
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install Bun dependencies
        run: bun install

      - name: Build Bun workspaces
        run: bun run build

      - name: Lint Bun workspaces
        run: bun run lint

      - name: Type-check
        run: bun run check-types

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install Bun dependencies
        run: bun install

      - name: Run tests with coverage
        run: bun run test

      - name: Type-check
        run: bun run check-types

  release:
    name: Snapshot Release (Alpha)
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.event_name == 'push'
    permissions:
      contents: write
    outputs:
      version: ${{ steps.snapshot.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install

      - id: snapshot
        name: Create alpha snapshot version
        run: |
          bun changeset version --snapshot alpha
          VERSION=$(node -p "require('./apps/finance/package.json').version")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Generated alpha snapshot: ${VERSION}"

  deploy:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [build, test, release]
    if: github.event_name == 'push'
    environment:
      name: development
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: web-app
            dockerfile: apps/web/Dockerfile
            runtime: bun
          - component: auth-app
            dockerfile: apps/auth/Dockerfile
            runtime: bun
          - component: admin-app
            dockerfile: apps/admin/Dockerfile
            runtime: bun
          - component: finance-app
            dockerfile: apps/finance/Dockerfile
            runtime: bun
          - component: core-service
            dockerfile: servers/core/Dockerfile
            runtime: bun
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        if: matrix.runtime == 'bun'
        run: bun install

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        id: meta
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          COMPONENT="${{ matrix.component }}"
          BRANCH_NAME=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]')
          TAGS="${{ env.REGISTRY }}/${COMPONENT}:${VERSION}"
          TAGS="${TAGS},${{ env.REGISTRY }}/${COMPONENT}:dev-${BRANCH_NAME}"
          TAGS="${TAGS},${{ env.REGISTRY }}/${COMPONENT}:dev-${BRANCH_NAME}-${GITHUB_SHA::8}"
          TAGS="${TAGS},${{ env.REGISTRY }}/${COMPONENT}:dev-latest"
          echo "image-tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GITLAB_USERNAME }}
          password: ${{ secrets.GITLAB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.image-tags }}
          build-args: |
            DEPLOY_ENV=development
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
