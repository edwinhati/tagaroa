name: Development Pipeline

on:
  push:
    branches:
      - "feature/**"
      - "fix/**"
      - "bugfix/**"
      - "hotfix/**"
      - "chore/**"
  pull_request:
    branches:
      - develop

env:
  REGISTRY: registry.gitlab.com/tagaroa
  BUN_VERSION: "1.3.12"
  ENVIRONMENT: development
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  build:
    name: Build (${{ matrix.task }})
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        task: [build, lint, check-types, knip]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            .turbo
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install

      - name: Run ${{ matrix.task }}
        run: |
          if [ "${{ matrix.task }}" = "knip" ]; then
            bunx knip --no-progress
          else
            bun turbo run ${{ matrix.task }} --affected
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            .turbo
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install

      - name: Run tests
        run: bun turbo run test --affected

  deploy:
    name: Deploy (${{ matrix.component }})
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push'
    environment:
      name: development
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: finance-app
            dockerfile: apps/finance/Dockerfile
          - component: auth-app
            dockerfile: apps/auth/Dockerfile
          - component: web-app
            dockerfile: apps/web/Dockerfile
          - component: admin-app
            dockerfile: apps/admin/Dockerfile
          - component: investment-app
            dockerfile: apps/investment/Dockerfile
          - component: core-service
            dockerfile: servers/core/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Sentry DSN
        id: vars
        run: |
          case "${{ matrix.component }}" in
            finance-app)    echo "sentry_dsn=${{ secrets.FINANCE_APP_SENTRY_DSN }}" >> $GITHUB_OUTPUT ;;
            auth-app)       echo "sentry_dsn=${{ secrets.AUTH_APP_SENTRY_DSN }}" >> $GITHUB_OUTPUT ;;
            web-app)        echo "sentry_dsn=${{ secrets.WEB_APP_SENTRY_DSN }}" >> $GITHUB_OUTPUT ;;
            admin-app)      echo "sentry_dsn=${{ secrets.ADMIN_APP_SENTRY_DSN }}" >> $GITHUB_OUTPUT ;;
            investment-app) echo "sentry_dsn=${{ secrets.INVESTMENT_APP_SENTRY_DSN }}" >> $GITHUB_OUTPUT ;;
          esac

      - uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        id: meta
        run: |
          COMPONENT="${{ matrix.component }}"
          TAGS="${{ env.REGISTRY }}/${COMPONENT}:alpha"
          TAGS="${TAGS},${{ env.REGISTRY }}/${COMPONENT}:${GITHUB_SHA::8}"
          echo "image-tags=${TAGS}" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GITLAB_USERNAME }}
          password: ${{ secrets.GITLAB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.image-tags }}
          build-args: |
            DEPLOY_ENV=development
            VCS_REF=${{ github.sha }}
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_AUTH_APP_URL=${{ vars.NEXT_PUBLIC_AUTH_APP_URL }}
            NEXT_PUBLIC_DASHBOARD_APP_URL=${{ vars.NEXT_PUBLIC_DASHBOARD_APP_URL }}
            NEXT_PUBLIC_MAIN_APP_URL=${{ vars.NEXT_PUBLIC_MAIN_APP_URL }}
            NEXT_PUBLIC_ALLOWED_REDIRECT_ORIGINS=${{ vars.NEXT_PUBLIC_ALLOWED_REDIRECT_ORIGINS }}
            NEXT_PUBLIC_SENTRY_DSN=${{ steps.vars.outputs.sentry_dsn }}
            NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE=${{ vars.NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
